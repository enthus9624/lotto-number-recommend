<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로또 번호 추천기</title>
    <style>
        body {
            font-family: "Pretendard", "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #89f7fe, #66a6ff);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px 50px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            text-align: center;
            width: 360px;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 26px;
            color: #333;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            background: #ff8a00;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        button:hover {
            background: #e57a00;
            transform: translateY(-2px);
        }

        #result {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .ball {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            animation: pop 0.3s ease;
        }

        @keyframes pop {
            from { transform: scale(0.3); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* 로또볼 컬러 랜덤 */
        .color1 { background: #ff5252; }
        .color2 { background: #ffb300; }
        .color3 { background: #4caf50; }
        .color4 { background: #42a5f5; }
        .color5 { background: #7e57c2; }
        .color6 { background: #ec407a; }

    </style>
</head>
<body>

    <div class="card">
        <h1>🎉 로또 번호 추천기</h1>
        
        <button onclick="generateLotto()">번호 추천 받기</button>

        <div id="result"></div>
    </div>

    <script>
        function generateLotto() {
            let numbers = new Set();

            while (numbers.size < 6) {
                numbers.add(Math.floor(Math.random() * 45) + 1);
            }

            let lotto = [...numbers].sort((a, b) => a - b);

            const resultDiv = document.getElementById("result");
            resultDiv.innerHTML = "";

            lotto.forEach((num, idx) => {
                const ball = document.createElement("div");
                ball.classList.add("ball", "color" + (idx + 1));
                ball.textContent = num;
                resultDiv.appendChild(ball);
            });
        }
    </script>

</body>
</html>
